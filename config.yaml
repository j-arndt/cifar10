target_accuracy: 0.940
target_wall_time_s: 1.0            # <1 second. Agents figure it out.
agent_model: "Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"
agent_context_tokens: 8192
compress_threshold_tokens: 6000
batch_size: 512                    # tinygrad hlb_cifar10 default BS
steps: 1000                        # tinygrad training steps
beam: 0                            # BEAM kernel search (agents can tune)
wino: 0                            # Winograd convolutions (agents can tune)
ema: 1                             # EMA weights
data_location: "data.pt"
max_hours: 4
rem_trigger_every_n_wins: 10
cuda_arch: "sm_89"
